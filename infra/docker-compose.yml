version: '3.8'

services:
  db:
    image: postgres:16
    container_name: lora-postgres
    environment:
      POSTGRES_USER: lora_user
      POSTGRES_PASSWORD: lora_password
      POSTGRES_DB: lora_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: lora-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
